name: Notify Digital Garden
on:
  push:
    branches:
      - master

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Build in Digital Garden
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/AdrianLazarski/digital_garden/dispatches \
          -d '{"event_type": "notes_updated"}'
