name: Deploy Quartz
on:
  push:
    branches:
      - v4
  repository_dispatch:
    types: [notes_updated]

env:
  THEME_NAME: fastpuccin

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Engine
        uses: actions/checkout@v6

      - name: Clear and Create Content Folder
        run: |
          rm -rf content
          mkdir -p content

      - name: Fetch Notes
        uses: actions/checkout@v6
        with:
          repository: AdrianLazarski/quartz
          path: content
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install & Build
        run: |
          node -v
          npm -v
          npm install --force --legacy-peer-deps
          npx quartz build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
          publish_branch: gh-pages